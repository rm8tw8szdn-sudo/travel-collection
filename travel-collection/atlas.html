<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>国家图鉴</title>
    <link rel="stylesheet" href="mobile.css" />
    <script src="home-components.js" defer></script>
    <script src="atlas.js" defer></script>
    <script src="app-shared.js" defer></script>
  </head>
  <body>
    <main class="home-screen atlas-screen" aria-label="国家图鉴">
      <status-bar></status-bar>

      <header class="atlas-header">
        <h1>国家图鉴</h1>
        <button type="button" aria-label="图鉴设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5H5v3M16 5h3v3M8 19H5v-3M16 19h3v-3"></path>
            <path d="M12 8.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4Z"></path>
            <path d="M12 6.8v2M12 15.2v2M6.8 12h2M15.2 12h2"></path>
          </svg>
        </button>
      </header>

      <label class="atlas-search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m20 20-4.2-4.2M10.7 17a6.3 6.3 0 1 1 0-12.6 6.3 6.3 0 0 1 0 12.6Z"></path>
        </svg>
        <input type="search" placeholder="搜索国家或城市" aria-label="搜索国家或城市" data-atlas-search />
      </label>

      <section class="atlas-filters" aria-label="状态筛选">
        <button class="active" type="button" data-filter="全部">全部</button>
        <button type="button" data-filter="已探索">已探索</button>
        <button type="button" data-filter="未探索">未探索</button>
        <button type="button" data-filter="收藏">收藏</button>
      </section>

      <section class="atlas-popular" aria-label="热门国家">
        <div class="atlas-section-head">
          <h2>热门国家</h2>
          <a href="#">查看全部 <span aria-hidden="true">›</span></a>
        </div>

        <div class="atlas-country-list">
          <button class="atlas-country-card" type="button" data-country="日本" data-status="已探索" data-favorite="true">
            <img src="assets/atlas-japan-cover.svg" alt="日本封面图" />
            <span class="atlas-card-shade"></span>
            <span class="atlas-country-name">日本</span>
            <span class="atlas-status-chip explored">已探索</span>
          </button>
          <button class="atlas-country-card" type="button" data-country="意大利" data-status="未探索">
            <img src="assets/atlas-italy-cover.svg" alt="意大利封面图" />
            <span class="atlas-card-shade"></span>
            <span class="atlas-country-name">意大利</span>
            <span class="atlas-status-chip">未探索</span>
          </button>
          <button class="atlas-country-card" type="button" data-country="冰岛" data-status="未探索" data-favorite="true">
            <img src="assets/atlas-iceland-cover.svg" alt="冰岛封面图" />
            <span class="atlas-card-shade"></span>
            <span class="atlas-country-name">冰岛</span>
            <span class="atlas-status-chip">未探索</span>
          </button>
        </div>
      </section>

      <section class="atlas-regions" aria-label="按地区浏览">
        <h2>按地区浏览</h2>
        <div class="atlas-region-grid">
          <button type="button" data-region="亚洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.4 7.4 10.2 4l4.2 1 1.2 2.8 3.3 1.1.8 4.5-3 2.2-1.2 3.9-3.3-1.4-2.4 1.4-2.3-2.7-2.7-.6 1.7-3.6-1.1-2.2Z"></path><path d="m10.2 4 .8 4.2 3.5 1.5-1.5 3.5 2.5 2.4"></path></svg>
            </span>
            <span>亚洲</span>
            <em>32 个国家</em>
          </button>
          <button type="button" data-region="欧洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.2 7.3 11.1 4.8l3.8.8 1.2 2.4 3.1 1.5-1.4 3.1.9 2.8-3.4 1.1-2.2 3-3.1-1.8-3.6.4-1.3-3.7 2.1-2.5-1-2.3Z"></path><path d="m11.1 4.8.8 4.3 4.2-1.1M11.9 9.1l-2.8 3.2 4 2.1 2.2 2.1"></path></svg>
            </span>
            <span>欧洲</span>
            <em>45 个国家</em>
          </button>
          <button type="button" data-region="北美洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.8 8.7 8.9 4.6l5.4.7 4.6 3.8-.7 3.8-3.4 1.1-1.8 2.9-3.5.7-3.1-2.6.5-3.1-2.3-1.3Z"></path><path d="m8.9 4.6 1.8 4.7 4.4.7 3.1 2.9M10.7 9.3l-3.8 2.6"></path></svg>
            </span>
            <span>北美洲</span>
            <em>23 个国家</em>
          </button>
          <button type="button" data-region="南美洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 4.4 14.6 6.2l2.7 4.1-1.8 3.1-2.4 1.5-.9 4.9-2 1.2-1.7-3.9.7-3.3-2.3-2.1.8-4.6Z"></path><path d="m14.6 6.2-2.4 3.6 3.3 3.6M12.2 9.8l-3 4"></path></svg>
            </span>
            <span>南美洲</span>
            <em>12 个国家</em>
          </button>
          <button type="button" data-region="非洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4.4h5.2l3.1 3.4 1.3 4.1-2.3 3.4.3 2.2-3.9 3.2-3.1-3.3-3.2-1.9.7-4.9-1.1-2.1Z"></path><path d="m14.2 4.4-2 5 2.6 2.3 1.5 3.6M12.2 9.4 8.7 11l.9 6.4"></path></svg>
            </span>
            <span>非洲</span>
            <em>54 个国家</em>
          </button>
          <button type="button" data-region="大洋洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.1 16.5 8.7 9.1l4.9 1.4 4.9 5.6-2.5 2.7-4.1-.9-2.9 1.3Z"></path><path d="M15.5 6.7l3.4 1.1M19.2 10.5l2 .7M8.7 9.1l3.2 8.8M13.6 10.5l2.4 8.3"></path></svg>
            </span>
            <span>大洋洲</span>
            <em>14 个国家</em>
          </button>
        </div>
      </section>

      <bottom-tab-bar active="图鉴"></bottom-tab-bar>
    </main>
  </body>
</html>
