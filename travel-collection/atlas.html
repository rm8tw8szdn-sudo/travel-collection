<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>国家图鉴</title>
    <link rel="stylesheet" href="mobile.css?v=atlas-settings-hidden-20260615" />
    <script src="travel-data.js?v=route-cover-clean-20260615" defer></script>
    <script src="travel-search.js" defer></script>
    <script src="travel-state.js?v=logic-state-20260607" defer></script>
    <script src="home-components.js?v=home-next-row-20260607" defer></script>
    <script src="atlas.js?v=list-image-loading-20260615" defer></script>
    <script src="app-shared.js?v=logic-state-20260607" defer></script>
  </head>
  <body>
    <main class="home-screen atlas-screen" aria-label="国家图鉴">
      <header class="atlas-header">
        <h1>国家图鉴</h1>
        <button type="button" aria-label="图鉴设置" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5H5v3M16 5h3v3M8 19H5v-3M16 19h3v-3"></path>
            <path d="M12 8.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4Z"></path>
            <path d="M12 6.8v2M12 15.2v2M6.8 12h2M15.2 12h2"></path>
          </svg>
        </button>
      </header>

      <label class="atlas-search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m20 20-4.2-4.2M10.7 17a6.3 6.3 0 1 1 0-12.6 6.3 6.3 0 0 1 0 12.6Z"></path>
        </svg>
        <input type="search" placeholder="搜索国家或城市" aria-label="搜索国家或城市" data-atlas-search />
      </label>

      <section class="atlas-filters" aria-label="状态筛选">
        <button class="active" type="button" data-filter="全部">全部</button>
        <button type="button" data-filter="已探索">已探索</button>
        <button type="button" data-filter="待出行">待出行</button>
        <button type="button" data-filter="未探索">未探索</button>
        <button type="button" data-filter="收藏">收藏</button>
      </section>

      <section class="atlas-popular" aria-label="热门国家">
        <div class="atlas-section-head">
          <h2>热门国家</h2>
          <a href="atlas.html#all" data-atlas-show-all>查看全部 <span aria-hidden="true">›</span></a>
        </div>

        <div class="atlas-country-list" data-atlas-results></div>
        <div class="atlas-pagination" data-atlas-pager></div>
      </section>

      <section class="atlas-regions" aria-label="按地区浏览">
        <h2>按地区浏览</h2>
        <div class="atlas-region-grid">
          <button type="button" data-region="亚洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 32 32" aria-hidden="true"><path class="continent-shape" d="M7.6 7.2 12 4.9l6.8.7 3.1 2 3.9.8 2.7 3.2-2 2.1-3.1-.5-2.1 1.2 1.5 2.4-1.1 3.2-3.2.8-2.6-1.2-2.2 1.4 1.1 3.4-2.5 3.6-1.9-3.3.2-3.3-2.7-2.8-3.8-.4-2.7-2 1.2-3.6 3.9-1.2Z"></path></svg>
            </span>
            <span>亚洲</span>
            <em>32 个国家</em>
          </button>
          <button type="button" data-region="欧洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 32 32" aria-hidden="true"><path class="continent-shape" d="M6.7 9.6 10 6.8l3.5.7 2.7-2.5 3.7 1.4 1.6 3.3 3.7.8 1.7 2.8-2.3 1.8-3-.5-1.2 2.8 2.4 2.8-1.6 2.6-3.8-.8-2.3 2.6-3.1-.7.4-3.7-2.6-1.5-3.2.8-2-2.6 2.5-2.3-1.9-2.7Z"></path></svg>
            </span>
            <span>欧洲</span>
            <em>45 个国家</em>
          </button>
          <button type="button" data-region="北美洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 32 32" aria-hidden="true"><path class="continent-shape" d="M4.9 6.3 11.4 4l6.6 1.2 4.8 3.3 3.9.4 1.2 3.1-3 2.3-4.1-.6-3.3 2.1-2.2 3.8 1.4 3.2-2.4 1.5-3.1-2.3-2.7-4.2-4.2-2.4-1.2-4.7Z"></path></svg>
            </span>
            <span>北美洲</span>
            <em>23 个国家</em>
          </button>
          <button type="button" data-region="南美洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 32 32" aria-hidden="true"><path class="continent-shape" d="M12.4 4.5 17.6 6l3.3 3.5-.8 4.1-2.8 1.8.9 3.4-1.9 4.9-2.6 1.9-.2 4.1-2.5-1.5-.8-4.6-2.4-3.2 1.3-4.6-2.2-3.5 1.4-4Z"></path></svg>
            </span>
            <span>南美洲</span>
            <em>12 个国家</em>
          </button>
          <button type="button" data-region="非洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 32 32" aria-hidden="true"><path class="continent-shape" d="M13.5 3.5 19.2 5l4 4.5-.6 4.8 2.3 3.3-3.4 2.9-1.8 5.3-3.7 3.2-3.5-4.6-1.7-4.7-4-2.9.7-5.1 2.6-3.1Z"></path></svg>
            </span>
            <span>非洲</span>
            <em>54 个国家</em>
          </button>
          <button type="button" data-region="大洋洲">
            <span class="atlas-region-icon">
              <svg viewBox="0 0 32 32" aria-hidden="true"><path class="continent-shape" d="M8.2 15.5 12.5 13l5.4.7 4.3 3.1-.5 3.3-4.7 1.4-5.8-.9-3.6-2.3Z"></path><path class="continent-shape" d="M23.2 21.5 25.8 22l1.5 1.8-1.9 1.7-2.6-.7-.9-1.7Z"></path><path class="continent-shape" d="M5.2 11.8 7.3 10l2.1.9-1.2 2.2-2.7.5Z"></path></svg>
            </span>
            <span>大洋洲</span>
            <em>14 个国家</em>
          </button>
        </div>
      </section>

      <bottom-tab-bar active="图鉴"></bottom-tab-bar>
    </main>
  </body>
</html>
