<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>北欧极光线 · 路线详情</title>
    <link rel="stylesheet" href="mobile.css?v=route-detail-polish-20260615" />
    <script src="travel-data.js?v=route-cover-clean-20260615" defer></script>
    <script src="travel-state.js?v=logic-state-20260607" defer></script>
    <script src="detail-enrichment.js?v=detail-cache-20260616" defer></script>
    <script src="home-components.js?v=home-next-row-20260607" defer></script>
    <script src="app-shared.js?v=logic-state-20260607" defer></script>
    <script src="route-detail.js?v=route-highlight-inline-20260615" defer></script>
  </head>
  <body>
    <main class="home-screen route-detail-screen" aria-label="北欧极光线路线详情">
      <header class="route-detail-top" aria-label="路线详情操作">
        <button class="route-detail-icon" type="button" aria-label="返回路线列表" data-route-back>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 5-7 7 7 7"></path></svg>
        </button>
        <div>
          <button class="route-detail-icon" type="button" aria-label="收藏路线" data-route-favorite aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19.2S5.2 15.1 5.2 9.9A3.7 3.7 0 0 1 12 7.8a3.7 3.7 0 0 1 6.8 2.1c0 5.2-6.8 9.3-6.8 9.3Z"></path></svg>
          </button>
        </div>
      </header>

      <section class="route-detail-hero" aria-label="北欧极光封面">
        <img src="assets/route-nordic-aurora-cover.svg" alt="北欧极光雪山湖泊小镇" />
      </section>

      <section class="route-detail-content">
        <section class="route-detail-title">
          <h1 data-route-name>北欧极光线</h1>
          <h2 data-route-places>挪威 · 冰岛 · 芬兰</h2>
          <p data-route-reason><strong>推荐语</strong>：把极光、峡湾和北欧城市设计放进同一趟轻量路线。</p>
          <p class="route-highlight-text" data-route-highlight-text>路线亮点：极光、自然风光、冬季。</p>
        </section>

        <section class="route-detail-summary" aria-label="路线核心信息">
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4v3M17 4v3M5.2 8.2h13.6"></path><rect x="4.2" y="5.8" width="15.6" height="14" rx="3"></rect></svg>
            <em>建议天数</em>
            <strong data-route-days>8-12天</strong>
          </span>
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 4c-7.2.4-11.4 4.6-12.6 12.6C14.4 15.4 18.6 11.2 19 4Z"></path><path d="M6.5 16.5 4 19"></path></svg>
            <em>最佳季节</em>
            <strong data-route-season>11月-3月</strong>
          </span>
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2"></path><rect x="5" y="10" width="14" height="10" rx="2"></rect></svg>
            <em>预算等级</em>
            <strong data-route-budget>中高</strong>
          </span>
        </section>

        <section class="route-detail-actions" aria-label="路线操作">
          <button type="button" data-route-add-trip="nordic-aurora">加入行程</button>
        </section>

        <section class="route-detail-section" data-route-cities aria-label="包含城市">
          <h2>包含城市</h2>
          <div class="route-city-grid"></div>
        </section>

        <section class="route-detail-section route-related-section" aria-label="相关路线">
          <div class="route-section-head"><h2>相关路线</h2><a href="routes.html">查看更多 ›</a></div>
          <div class="route-related-list"></div>
        </section>
      </section>
    </main>
  </body>
</html>
