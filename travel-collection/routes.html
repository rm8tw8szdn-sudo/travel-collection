<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>路线库</title>
    <link rel="icon" href="assets/profile-avatar-kuma-small.jpg" />
    <link rel="stylesheet" href="mobile.css?v=page-title-compact-20260613" />
    <script src="travel-data.js?v=route-cover-clean-20260615" defer></script>
    <script src="travel-search.js" defer></script>
    <script src="travel-state.js?v=logic-state-20260607" defer></script>
    <script src="home-components.js?v=home-next-row-20260607" defer></script>
    <script src="route-candidates.js?v=online-candidates-20260616" defer></script>

  <body>
    <main class="home-screen route-screen" aria-label="路线库">
      <header class="route-header">
        <h1>路线灵感库</h1>
      </header>

      <label class="atlas-search route-search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m20 20-4.2-4.2M10.7 17a6.3 6.3 0 1 1 0-12.6 6.3 6.3 0 0 1 0 12.6Z"></path>
        </svg>
        <input type="search" placeholder="搜索路线" aria-label="搜索路线" data-route-search />
      </label>
      <p class="route-search-summary" data-route-search-summary hidden></p>

      <section class="route-tabs" aria-label="路线类型">
        <button class="active" type="button" data-route-tab="跨国路线">跨国路线</button>
        <button type="button" data-route-tab="单国城市路线">单国城市路线</button>
      </section>

      <section class="route-list" aria-label="路线灵感列表" data-route-results></section>

      <bottom-tab-bar active="路线"></bottom-tab-bar>
    </main>
  </body>
